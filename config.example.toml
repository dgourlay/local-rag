# dropbox-rag configuration
# Copy to ~/.config/dropbox-rag/config.toml and edit, or run `rag init`.

[folders]
# Required: directories to index (supports ~ for home)
paths = ["~/Documents", "~/Dropbox"]
# extensions = ["pdf", "docx", "txt", "md"]
# ignore = ["**/node_modules", "**/.git", "**/venv", "**/__pycache__"]

# All sections below are optional -- defaults shown as comments.

# [database]
# path = "~/.local/share/dropbox-rag/metadata.db"

# [qdrant]
# url = "http://localhost:6333"
# collection = "documents"

# [embedding]
# model = "BAAI/bge-m3"
# dimensions = 1024
# batch_size = 32
# cache_dir = "~/.cache/dropbox-rag/models"

# [reranker]
# model_path = "~/.cache/dropbox-rag/models/bge-reranker-v2-m3"
# top_k_candidates = 30
# top_k_final = 10

# [summarization]
# enabled = true
# command = "claude"
# args = ["--print", "--max-tokens", "2048"]
# timeout_seconds = 60

# [mcp]
# transport = "stdio"
# host = "127.0.0.1"
# port = 8080

# [watcher]
# poll_interval_seconds = 5
# debounce_seconds = 2
# use_polling = false
# batch_window_seconds = 10
